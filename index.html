<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MapLibre Scrollytelling Demo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .story-block {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 1rem 2rem;
    }

    .story-card {
      width: 100%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.08);
    }

    .map-column {
      position: relative;
      min-height: 100vh;
    }

    .map-fixed {
      position: fixed;
      top: 0;
      right: 0;
      z-index: -1;
      width: 100%;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }
    .custom-marker {
  width: 56px;
  height: 40px;
  background-image: url("uni.jpg");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
}
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row">
      
      <!-- Story cards holder-->
      <div class="col-12 col-lg-5 story-column" id="story">

        <!-- the first story block hard-coded. The others are generated -->
        <section class="story-block intro-block">
          <div class="story-card" data-card-type="intro">
            <h2 class="h4 mb-3 text-center">Purple Sea Urchin Map</h2>
            <p class="mb-0 text-center">This map shows representative coastal sites across California where purple sea urchins are commonly found in rocky reef and kelp forest ecosystems.
 </p>
          </div>
        </section>

      </div>

      <!-- Map holder -->
      <div class="col-12 map-column">
        <div class="map-fixed">
          <div id="map"></div>
        </div>
      </div>
    </div>
  </div>

  <script>

 const locations = [
  {
    title: "Caspar Cove (Mendocino Coast)",
    lat: 39.3630,
    lon: -123.8140,
    zoom: 9,
    description: "Rocky reef habitat with high purple sea urchin presence and nearby kelp forest dynamics along the Mendocino coast.", Image: "casparcoe.jpg"
  },
  {
    title: "Salt Point State Park (Sonoma Coast)",
    lat: 38.5669,
    lon: -123.3280,
    zoom: 9,
    description: "Exposed rocky intertidal zone where purple sea urchins are commonly found in tidepools and subtidal reef edges."
  },
  {
    title: "Fort Ross Coastal Area (Sonoma County)",
    lat: 38.5130,
    lon: -123.2465,
    zoom: 9,
    description: "Mixed kelp forest and rocky reef system representing a transition zone where purple sea urchins are present."
  },
  {
    title: "Año Nuevo State Park Coast",
    lat: 37.1080,
    lon: -122.3365,
    zoom: 9,
    description: "Wave-exposed rocky shoreline with subtidal reef habitats supporting purple sea urchin populations."
  },
  {
    title: "Monterey Bay / Moss Landing Region",
    lat: 36.8065,
    lon: -121.7900,
    zoom: 10,
    description: "Well-studied kelp forest ecosystem where purple sea urchins are present in both healthy and degraded reef zones."
  },
  {
    title: "Point Loma Rocky Reefs (San Diego)",
    lat: 32.6556,
    lon: -117.2425,
    zoom: 10,
    description: "Southern California kelp forest edge habitat with established purple sea urchin populations on rocky reefs."
  },
  {
    title: "La Jolla Cove Reef System",
    lat: 32.8338,
    lon: -117.2713,
    zoom: 10,
    description: "Rocky reef ecosystem with kelp forest influence and consistent purple sea urchin presence."
  }
]; //YOU NEED TO EDIT THIS LINE FOR THE MAP TO WORK


    //Check out other basemap options here: https://madewithmaplibre.com/basemaps/gallery
   const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      "raster-tiles": {
        type: "raster",
        tiles: [
          "https://mt0.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
          "https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
          "https://mt2.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
          "https://mt3.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
        ],
        tileSize: 256,
      },
    },
    layers: [{ id: "raster-layer", type: "raster", source: "raster-tiles" }],
  },

    });

    //disable all interactions with the map
    map.scrollZoom.disable();
    map.dragPan.disable();
    map.dragRotate.disable();
    map.touchZoomRotate.disable();
    map.doubleClickZoom.disable();
    map.keyboard.disable();

    // Add markers
locations.forEach(location => {
  const el = document.createElement("div");
  el.className = "custom-marker";

  new maplibregl.Marker({ element: el, anchor: "bottom" })
    .setLngLat([location.lon, location.lat])
    .addTo(map);
});

    // Build bounds for opening overview
    const openingBounds = new maplibregl.LngLatBounds();
    locations.forEach(location => {
      openingBounds.extend([location.lon, location.lat]);
    });

    const storyContainer = document.querySelector("#story");

    locations.forEach((location, index) => {
      const block = document.createElement("section");
      block.className = "story-block";

      block.innerHTML = `
        <div class="story-card" data-card-type="location" data-location-index="${index}">
          <h2 class="h4 mb-3">${location.title}</h2>
          <p class="mb-0">${location.description}</p>
        </div>
      `;

      storyContainer.appendChild(block);
    });

    const introCard = document.querySelector('.story-card[data-card-type="intro"]');
    const allCards = document.querySelectorAll("#story .story-card");

    let activeState = null;

    function showOpeningOverview(animated = true) {
      if (activeState === "intro") return;
      activeState = "intro";

      map.fitBounds(openingBounds, {
        padding: { top: 80, right: 80, bottom: 80, left: 80 },
        maxZoom: 5,
        duration: animated ? 1200 : 0
      });
    }

    function activateLocation(locationIndex) {
      if (activeState === locationIndex) return;

      const location = locations[locationIndex];
      if (!location) return;

      activeState = locationIndex;

      map.flyTo({
        center: [location.lon, location.lat],
        zoom: location.zoom,
        speed: 0.9,
        curve: 1.2,
        essential: true
      });
    }

    function getClosestCardToViewportMiddle() {
      const viewportMid = window.innerHeight / 2;
      let closestCard = null;
      let closestDistance = Infinity;

      allCards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const cardCenter = rect.top + (rect.height / 2);
        const distance = Math.abs(cardCenter - viewportMid);

        if (distance < closestDistance) {
          closestDistance = distance;
          closestCard = card;
        }
      });

      return closestCard;
    }

    function updateMapFromScroll() {
      const closestCard = getClosestCardToViewportMiddle();
      if (!closestCard) return;

      const cardType = closestCard.dataset.cardType;

      if (cardType === "intro") {
        showOpeningOverview();
        return;
      }

      if (cardType === "location") {
        const locationIndex = Number(closestCard.dataset.locationIndex);
        activateLocation(locationIndex);
      }
    }

  
    const observer = new IntersectionObserver(
      entries => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            updateMapFromScroll();
            break;
          }
        }
      },
      {
        root: null,
        rootMargin: "-45% 0px -45% 0px",
        threshold: 0
      }
    );

    allCards.forEach(card => observer.observe(card));

    window.addEventListener("scroll", updateMapFromScroll, { passive: true });
    window.addEventListener("resize", updateMapFromScroll);

    map.on("load", () => {
      showOpeningOverview(false);
    });
  </script>
</body>
</html>
